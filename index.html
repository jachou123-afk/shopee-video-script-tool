<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>蝦皮商品拍攝腳本工具</title>
  <style>
    :root{--ink:#19231f;--green:#174b3a;--lime:#d9f46b;--paper:#f7f6f1;--line:#dfe3df}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);background:var(--paper);font-family:"Microsoft JhengHei",Arial,sans-serif}button,textarea{font:inherit}button{cursor:pointer}
    header{max-width:920px;height:66px;margin:auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}header strong{display:flex;align-items:center;gap:9px;font-size:17px}header strong b{display:grid;place-items:center;width:30px;height:30px;color:var(--green);background:var(--lime);border-radius:9px}header span{color:#718078;font-size:12px}
    .hero{max-width:700px;min-height:590px;margin:auto;padding:75px 18px 65px;text-align:center}.tag{margin:0 0 15px;color:#607269;font-size:12px;font-weight:800;letter-spacing:.12em}h1{margin:0;font-size:clamp(36px,7vw,60px);line-height:1.15;letter-spacing:-.055em}.intro{margin:19px 0 28px;color:#69756f;font-size:14px}
    .card{padding:21px;border:1px solid var(--line);border-radius:19px;background:#fff;text-align:left;box-shadow:0 18px 55px rgba(27,64,50,.09)}label{display:block;margin-bottom:9px;font-size:13px;font-weight:900}textarea{width:100%;min-height:86px;padding:14px;resize:vertical;color:#25342d;background:#fbfcfa;border:1.5px solid #ccd4cf;border-radius:11px;outline:none;font-size:13px;line-height:1.55}textarea:focus{border-color:var(--green);box-shadow:0 0 0 4px #e8f0ec}.error{display:none;margin:8px 2px 0;color:#b54a3f;font-size:11px}.generate{width:100%;height:53px;margin-top:14px;border:0;border-radius:11px;color:#fff;background:var(--green);font-weight:900}.generate:hover{background:#1f604a}.generate:disabled{cursor:not-allowed;opacity:.38}.steps{margin:18px 0 0;color:#97a09b;font-size:11px}
    .result{display:none;max-width:880px;margin:0 auto 90px;padding:0 18px;scroll-margin-top:22px}.head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:14px}.head small{display:inline-block;margin-bottom:7px;padding:5px 9px;color:var(--green);background:#e6f2d1;border-radius:20px;font-weight:900}.head h2{margin:0;font-size:28px}.copy{min-width:108px;padding:10px 14px;color:var(--green);background:#fff;border:1px solid #cad4ce;border-radius:9px;font-size:12px;font-weight:800}.prepare{margin:0 0 12px;padding:13px 15px;color:#58675f;background:#e9eee9;border-radius:10px;font-size:12px;line-height:1.6}.scenes{display:grid;gap:10px}.scene{display:grid;grid-template-columns:38px 88px 1fr;gap:13px;padding:17px;background:#fff;border:1px solid var(--line);border-radius:13px}.number{display:grid;place-items:center;align-self:start;width:33px;height:33px;color:var(--green);background:var(--lime);border-radius:50%;font-size:12px;font-weight:900}.time b,.time span{display:block}.time b{margin-top:2px;font-size:12px}.time span{margin-top:5px;color:#718078;font-size:11px}.content{display:grid;gap:8px}.content p{display:grid;grid-template-columns:44px 1fr;gap:7px;margin:0;color:#3d4b44;font-size:12px;line-height:1.65}.content strong{color:#87918c;font-size:10px;letter-spacing:.06em}.content .caption{padding:7px 9px;color:#2f5245;background:#f2f7e6;border-radius:7px;font-weight:800}.copy-all{width:100%;height:49px;margin-top:14px;color:#fff;background:var(--green);border:0;border-radius:10px;font-weight:900}footer{padding:25px 18px;color:#929b96;border-top:1px solid var(--line);text-align:center;font-size:11px}
    @media(max-width:620px){header{height:58px;padding:0 14px}header span{font-size:10px}.hero{min-height:540px;padding:55px 13px 50px}.card{padding:16px}.result{padding:0 12px;margin-bottom:70px}.head{align-items:flex-start;flex-direction:column}.copy{width:100%}.scene{grid-template-columns:38px 1fr;padding:14px}.time{grid-column:2}.content{grid-column:1/3}.content p{grid-template-columns:40px 1fr}}
  </style>
</head>
<body>
  <header><strong><b>拍</b>商品拍攝腳本</strong><span>免登入・離線可用</span></header>
  <main>
    <section class="hero" id="top">
      <p class="tag">給蝦皮短影片拍攝人員</p>
      <h1>貼上商品連結<br>馬上產生拍攝腳本</h1>
      <p class="intro">約 40 秒，包含拍攝畫面、口播和字幕。</p>
      <div class="card">
        <label for="url">蝦皮商品連結</label>
        <textarea id="url" rows="3" placeholder="把蝦皮商品網址貼在這裡"></textarea>
        <p class="error" id="error">請貼上 shopee.tw 的商品連結</p>
        <button class="generate" id="generate" disabled>產生簡單腳本</button>
      </div>
      <p class="steps">貼連結　→　產生腳本　→　照著拍</p>
    </section>
    <section class="result" id="result">
      <div class="head"><div><small>約 40 秒</small><h2 id="productName"></h2></div><button class="copy" id="copyTop">複製腳本</button></div>
      <p class="prepare"><b>拍攝前：</b>準備商品、乾淨桌面、2–3 個搭配小物，手機直式拍攝。</p>
      <div class="scenes" id="scenes"></div>
      <button class="copy-all" id="copyBottom">複製完整腳本給同仁</button>
    </section>
  </main>
  <footer>商品拍攝腳本工具・貼上連結就能開始</footer>
  <script>
    const input=document.querySelector('#url');
    const generate=document.querySelector('#generate');
    const error=document.querySelector('#error');
    const result=document.querySelector('#result');
    let current=null;

    const features=[['尺寸','多種尺寸可選'],['透明','內容物一眼看清楚'],['磨砂','磨砂質感'],['防塵','防塵好收納'],['收納','分類收納更整齊'],['旅行','外出旅行方便攜帶'],['帆布','耐磨帆布材質'],['碎花','可愛碎花外型'],['迷你','小巧不占空間'],['拉鍊','拉鍊開合好拿取'],['拉鏈','拉鍊開合好拿取'],['零錢','零錢卡片集中收好']];

    function validUrl(value){try{return new URL(value.trim().split(/\s+/)[0]).hostname.endsWith('shopee.tw')}catch{return false}}
    input.addEventListener('input',()=>{const has=input.value.trim().length>0;const valid=validUrl(input.value);generate.disabled=!valid;error.style.display=has&&!valid?'block':'none';result.style.display='none'});

    function parseProduct(raw){
      let title='這款商品';
      try{const url=new URL(raw.trim().split(/\s+/)[0]);title=decodeURIComponent(url.pathname).replace(/^\//,'').replace(/-i\.\d+\.\d+.*$/i,'').replace(/-/g,' ').replace(/\s+/g,' ').trim()||title}catch{}
      const category=/零錢包|硬幣包|帆布包/.test(title)?'零錢包':/收納袋|夾鏈袋|拉鍊袋|拉鏈袋|包裝袋|防塵袋/.test(title)?'收納袋':/衣|褲|裙|外套|上衣/.test(title)?'服飾':/杯|鍋|餐具|廚房/.test(title)?'居家用品':'商品';
      const found=features.filter(([word])=>title.includes(word)).map(([,text])=>text).filter((item,index,list)=>list.indexOf(item)===index).slice(0,3);
      ['外型簡單好搭配','使用方式很直覺','日常使用很方便'].forEach(item=>{if(found.length<3&&!found.includes(item))found.push(item)});
      const clean=(title.split('】').pop()||title).trim();
      const name=clean.split(' ').filter(Boolean).slice(0,3).join(' ')||category;
      return{name,category,features:found};
    }

    function makeScenes(p){
      const actions={
        '收納袋':['桌上先放幾樣散亂小物，再把商品推進畫面','拉開拉鍊，依序放入口罩、線材或旅行小物','近拍袋身材質、拉鍊與內容物','將不同物品分類收好，拍整理前後對比'],
        '零錢包':['把零錢包放在手掌，拍正面與背面','拉開拉鍊，放入硬幣、鈔票與卡片','近拍布料、車線與圖案細節','把零錢包放進口袋或隨身包，再拿出使用'],
        '服飾':['先拍整件商品，再快速切到穿著畫面','拍正面、側面與背面，展示整體版型','近拍布料、車線與重要設計細節','搭配日常服裝走動或轉身，呈現實穿效果'],
        '居家用品':['先拍原本不方便的情境，再讓商品入鏡','用手完整示範一次主要使用方式','近拍材質、尺寸與關鍵設計','拍使用前後對比，讓效果一眼看懂'],
        '商品':['商品從畫面外推入，正反面各拍一次','用雙手示範最主要的使用方式','近拍材質、做工與重要細節','放進日常情境中，拍出實際使用方式']
      }[p.category];
      return[
        ['0–3 秒','開場吸引',actions[0],`先別滑！今天來看這款 ${p.name}。`,`${p.name}｜快速開箱`],
        ['3–9 秒','商品介紹','商品放在乾淨背景上，鏡頭由遠慢慢推近',`它最方便的地方，就是 ${p.features[0]}。`,`✓ ${p.features[0]}`],
        ['9–18 秒','實際示範',actions[1],'實際用給你看，操作很簡單，平常使用不會手忙腳亂。','操作簡單・一看就會'],
        ['18–27 秒','細節特寫',actions[2],`近看細節也很實用，${p.features[1]}。`,`✓ ${p.features[1]}`],
        ['27–36 秒','使用情境',actions[3],`不管放家裡或帶出門都很適合，${p.features[2]}。`,`✓ ${p.features[2]}`],
        ['36–42 秒','結尾推薦','商品放在畫面中央，手指向購物車位置並停留 2 秒','如果你剛好需要，可以點下方看看款式和尺寸。','喜歡就到下方看看']
      ];
    }

    function escapeHtml(value){const div=document.createElement('div');div.textContent=value;return div.innerHTML}
    function fullText(){return [`【${current.product.name}｜約 40 秒拍攝腳本】`,'',...current.scenes.map((s,i)=>`${i+1}. ${s[0]}｜${s[1]}\n拍攝：${s[2]}\n口播：${s[3]}\n字幕：${s[4]}`)].join('\n\n')}
    function copy(button){navigator.clipboard.writeText(fullText()).then(()=>{const old=button.textContent;button.textContent='已複製 ✓';setTimeout(()=>button.textContent=old,1500)})}

    generate.addEventListener('click',()=>{
      const product=parseProduct(input.value);const scenes=makeScenes(product);current={product,scenes};
      document.querySelector('#productName').textContent=product.name;
      document.querySelector('#scenes').innerHTML=scenes.map((s,i)=>`<article class="scene"><div class="number">${i+1}</div><div class="time"><b>${escapeHtml(s[0])}</b><span>${escapeHtml(s[1])}</span></div><div class="content"><p><strong>拍攝</strong><span>${escapeHtml(s[2])}</span></p><p><strong>口播</strong><span>「${escapeHtml(s[3])}」</span></p><p class="caption"><strong>字幕</strong><span>${escapeHtml(s[4])}</span></p></div></article>`).join('');
      result.style.display='block';setTimeout(()=>result.scrollIntoView({behavior:'smooth'}),30);
    });
    document.querySelector('#copyTop').addEventListener('click',event=>copy(event.currentTarget));
    document.querySelector('#copyBottom').addEventListener('click',event=>copy(event.currentTarget));
  </script>
</body>
</html>
